[target.riscv64gc-unknown-linux-gnu]
linker = "/opt/F1/bin/riscv64-unknown-linux-gnu-gcc"
ar = "/opt/F1/bin/riscv64-unknown-linux-gnu-ar"
rustflags = [
    "-C", "link-arg=-L/home/shm/project_C/F1/code/KR_ROOM/lib",
    "-C", "link-arg=-L/opt/F1/riscv64-unknown-linux-gnu/lib64/lp64d",
    "-C", "link-arg=-L/opt/F1/sysroot/lib64/lp64d",
    "-C", "link-arg=-L/opt/F1/lib/riscv64-unknown-linux-gnu",
    "-C", "link-arg=-L/opt/F1/lib",
    "-C", "link-arg=-Wl,--allow-shlib-undefined",
]

# 指定使用 adb 的部署脚本
runner = "bash adb_run.sh"

[build]
target = "riscv64gc-unknown-linux-gnu"

[env]
CC_riscv64gc_unknown_linux_gnu = "/opt/F1/bin/riscv64-unknown-linux-gnu-gcc"
AR_riscv64gc_unknown_linux_gnu = "/opt/F1/bin/riscv64-unknown-linux-gnu-ar"
